name: AskSQL CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libpq-dev build-essential

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install flake8 pytest

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 backend/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Seed database
      env:
        DATABASE_ADMIN_URL: postgresql://postgres@localhost:5432/asksql
      run: |
        # Run seed script to load e-commerce dataset into Postgres container
        python -m backend.data.seed_data.seed_db

    - name: Generate Chroma Embeddings
      env:
        DATABASE_ADMIN_URL: postgresql://postgres@localhost:5432/asksql
        DATABASE_URL: postgresql://asksql_readonly:readonly_password@localhost:5432/asksql
        CHROMA_PERSIST_DIR: ./backend/data/chroma
      run: |
        # Generate the ChromaDB persistence collection of schema data
        python -m backend.app.rag.embed_schema

    - name: Run SQL Validator self-tests
      run: |
        # Execute the self-test inside sql_validator
        python -m backend.app.validator.sql_validator

    - name: Run Evaluation script (mocked LLM or with API Key)
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        DATABASE_ADMIN_URL: postgresql://postgres@localhost:5432/asksql
        DATABASE_URL: postgresql://asksql_readonly:readonly_password@localhost:5432/asksql
        CHROMA_PERSIST_DIR: ./backend/data/chroma
      run: |
        # If API key is available, run evaluation, else log warning to not block PRs without secrets
        if [ -n "$GROQ_API_KEY" ]; then
          python -m backend.eval.run_eval
        else
          echo "WARNING: GROQ_API_KEY secret not found. Skipping full LLM evaluation benchmark check."
        fi
