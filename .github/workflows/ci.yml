name: AskSQL CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install flake8 pytest requests

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 backend/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run FastAPI Backend Server
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        # Start uvicorn server in the background
        python -m uvicorn backend.app.main:app --host 127.0.0.1 --port 8000 &
        # Sleep for a few seconds to let the model & server spin up
        sleep 10

    - name: Run Upload & Query Integration Tests
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        # If API key is available, run upload and query tests, otherwise log warning
        if [ -n "$GROQ_API_KEY" ]; then
          python backend/eval/test_upload.py
        else
          echo "WARNING: GROQ_API_KEY secret not found. Skipping LLM schema generation tests."
        fi
