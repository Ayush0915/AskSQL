version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: asksql-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: asksql-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATABASE_URL=postgresql://asksql_readonly:readonly_password@db:5432/asksql
      - DATABASE_ADMIN_URL=postgresql://postgres@db:5432/asksql
      - CHROMA_PERSIST_DIR=/app/backend/data/chroma
      - BACKEND_PORT=8000
      - FRONTEND_API_BASE_URL=http://localhost:8000
      - QUERY_TIMEOUT_SECONDS=5
      - QUERY_ROW_LIMIT=500
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - chroma-data:/app/backend/data/chroma

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8000
    container_name: asksql-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  chroma-data:
