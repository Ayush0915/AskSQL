version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: asksql-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CHROMA_PERSIST_DIR=/app/backend/data/chroma
      - SESSIONS_DIR=/app/backend/sessions
      - BACKEND_PORT=8000
      - FRONTEND_API_BASE_URL=http://localhost:8000
      - QUERY_TIMEOUT_SECONDS=5
      - QUERY_ROW_LIMIT=500
    volumes:
      - chroma-data:/app/backend/data/chroma
      - sessions-data:/app/backend/sessions

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8000
    container_name: asksql-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  chroma-data:
  sessions-data:
